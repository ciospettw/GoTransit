name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: build & vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...

  test:
    name: full test suite (E2E included)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      # the whole suite: unit, synthetic RAPTOR/overlay/graph, the wall-clock
      # live-tracking E2E (fake evolving GTFS-RT feed), WebSocket roundtrip —
      # with the race detector on. Real-data tests self-skip without
      # GOTRANSIT_TEST_DATA.
      - name: go test -race
        run: go test -race -timeout 20m ./...

  test-short:
    name: quick suite (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go test -short -timeout 10m ./...
